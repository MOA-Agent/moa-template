name: 템플릿 피드백
description: MOA Template 사용 중 발견한 문제나 개선 아이디어를 남겨주세요.
title: "[피드백] "
labels: ["feedback"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 피드백 유형
      options:
        - 버그 / 오류
        - 기능 개선 제안
        - 문서 / 설명 부족
        - 기타
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 내용
      description: 겪은 문제나 제안하고 싶은 내용을 자유롭게 작성해주세요.
    validations:
      required: true

  - type: input
    id: project
    attributes:
      label: 사용 중인 프로젝트 이름 (선택)
      description: 어떤 프로젝트에서 발생한 문제인지 알려주시면 도움이 됩니다.

  - type: input
    id: template-version
    attributes:
      label: 템플릿 버전 (선택)
      description: ".claude/VERSION 파일에서 확인할 수 있습니다."
