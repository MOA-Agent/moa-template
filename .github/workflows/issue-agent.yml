name: Issue Agent

on:
  issues:
    types: [opened]

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: github.event.repository.is_template == true
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Analyze issue and post comment
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 레포 파일 목록 수집
          FILES=$(find . -type f \( -name "*.md" -o -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.json" \) \
            ! -path "*/node_modules/*" ! -path "*/.git/*" | head -50)

          # 주요 파일 내용 수집 (임시 파일에 저장)
          FILE_CONTENTS_PATH=$(mktemp)
          for f in $FILES; do
            printf "\n\n### %s\n\`\`\`\n" "$f" >> "$FILE_CONTENTS_PATH"
            cat "$f" >> "$FILE_CONTENTS_PATH"
            printf "\n\`\`\`" >> "$FILE_CONTENTS_PATH"
          done

          # OpenAI API 호출
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg title "$ISSUE_TITLE" \
              --arg body "$ISSUE_BODY" \
              --rawfile files "$FILE_CONTENTS_PATH" \
              '{
                model: "gpt-4o",
                messages: [
                  {
                    role: "system",
                    content: "당신은 MOA 프로젝트 템플릿의 코드 리뷰어입니다. 이슈를 분석하고 한국어로 답변해주세요."
                  },
                  {
                    role: "user",
                    content: "## 이슈 제목\n\($title)\n\n## 이슈 내용\n\($body)\n\n## 레포 파일\n\($files)\n\n## 요청사항\n1. 이슈를 요약해주세요.\n2. 개선 방안을 구체적으로 제안해주세요.\n3. 코드 수정이 필요한 경우 수정 전/후를 diff 형태로 보여주세요.\n4. 추가로 고려할 사항이 있으면 언급해주세요."
                  }
                ]
              }')" | jq -r '.choices[0].message.content')
          rm -f "$FILE_CONTENTS_PATH"

          gh issue comment "${ISSUE_NUMBER}" --body "## 🤖 Agent 분석 결과

          ${RESPONSE}

          ---
          *이 댓글은 OpenAI Agent가 자동으로 생성했습니다.*"
