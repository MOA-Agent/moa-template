<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--alias-color-background-normal); }
  .card { width: 700px; box-sizing: border-box; padding: 24px 28px; }
  .section-title { font: 500 11px/14px var(--font-sans); letter-spacing: 0.02em; color: var(--alias-color-label-alternative); margin-bottom: 12px; text-transform: uppercase; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  /* TAG / CHIP — base capsule */
  .tag {
    display: inline-flex; align-items: center; gap: 4px;
    border-radius: 40px;
    font-family: var(--font-sans);
    line-height: 1;
    white-space: nowrap;
  }
  .tag.sm { padding: 4px 10px; font-size: 12px; font-weight: 500; letter-spacing: 0.02em; line-height: 16px; height: 24px; box-sizing: border-box; }
  .tag.md { padding: 4px 12px; font-size: 14px; font-weight: 500; letter-spacing: 0.01em; line-height: 22px; height: 30px; box-sizing: border-box; }
  .dot { width: 12px; height: 12px; border-radius: 9999px; background: currentColor; opacity: .9; }
  
  .group { display: flex; flex-direction: column; gap: 14px; padding: 4px 0; }
  .sk { border-radius: 8px; background: linear-gradient(90deg, rgba(146,153,160,.08) 0%, rgba(146,153,160,.16) 50%, rgba(146,153,160,.08) 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; height: 16px; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .row { display: flex; align-items: center; gap: 14px; }
  .avatar { width: 40px; height: 40px; border-radius: 9999px; background: linear-gradient(90deg, rgba(146,153,160,.08) 0%, rgba(146,153,160,.16) 50%, rgba(146,153,160,.08) 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; flex-shrink: 0; }
  .col { display: flex; flex-direction: column; gap: 8px; flex: 1; }

</style>
</head>
<body>
<div class="card">
<div class="group">
  <div class="sk" style="width: 60%; height: 22px;"></div>
  <div class="sk" style="width: 92%;"></div>
  <div class="sk" style="width: 78%;"></div>
  <div class="row">
    <div class="avatar"></div>
    <div class="col">
      <div class="sk" style="width: 40%;"></div>
      <div class="sk" style="width: 70%;"></div>
    </div>
  </div>
</div>
</div></body></html>
