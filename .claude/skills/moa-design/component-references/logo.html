<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--alias-color-background-normal); }
  .card { width: 700px; box-sizing: border-box; padding: 28px 32px; }

  .lockup {
    display: flex; align-items: center; gap: 28px;
    padding: 8px 0 22px;
    border-bottom: 1px solid var(--alias-color-line-normal);
  }
  .symbol { width: 104px; height: 104px; flex-shrink: 0; display: block; }
  .wordmark { font-family: var(--font-sans); font-weight: 800; font-size: 64px; line-height: 1; letter-spacing: -0.04em; color: var(--alias-color-label-normal); }
  .tag { font: 500 13px/18px var(--font-sans); letter-spacing: 0.02em; color: var(--alias-color-label-alternative); margin-top: 8px; }

  .surfaces {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
    margin-top: 22px;
  }
  .surface { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .badge {
    width: 132px; height: 132px;
    border-radius: 9999px;
    display: flex; align-items: center; justify-content: center;
  }
  .badge.blue { background: var(--alias-color-primary-normal); }
  .badge.white { background: #fff; box-shadow: inset 0 0 0 1px var(--alias-color-line-strong); }
  .badge.dark { background: #151515; }
  .badge svg { width: 76px; height: 76px; }
  .caption {
    font: 500 11px/14px var(--font-sans);
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--alias-color-label-alternative);
  }
</style>
</head>
<body>
<div class="card">

  <div class="lockup">
    <img class="symbol" src="../assets/mile-symbol-new.png" alt="Mile symbol">
    <div>
      <div class="wordmark">Mile</div>
      <div class="tag">Design System · v.1.0</div>
    </div>
  </div>

  <!-- Bold "M" letterform — surface treatments -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <symbol id="mile-m" viewBox="0 0 100 100">
      <!-- Bold geometric M, stroke-built, matching the rounded-square and circle reference assets -->
      <path d="M 22 78 L 22 22 L 36 22 L 50 50 L 64 22 L 78 22 L 78 78 L 65 78 L 65 44 L 53 67 L 47 67 L 35 44 L 35 78 Z"
            fill="currentColor"/>
    </symbol>
  </svg>

  <div class="surfaces">
    <div class="surface">
      <div class="badge blue" style="color:#fff"><svg><use href="#mile-m"/></svg></div>
      <div class="caption">Primary</div>
    </div>
    <div class="surface">
      <div class="badge white" style="color:var(--alias-color-primary-normal)"><svg><use href="#mile-m"/></svg></div>
      <div class="caption">Inverse</div>
    </div>
    <div class="surface">
      <div class="badge dark" style="color:#fff"><svg><use href="#mile-m"/></svg></div>
      <div class="caption">Dark</div>
    </div>
  </div>

</div>
</body>
</html>
