<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--alias-color-background-normal); }
  .card { width: 700px; box-sizing: border-box; padding: 24px 28px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 8px; }
  .chip {
    width: 88px; height: 88px; border-radius: 12px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.04);
  }
  .chip.sm { width: 64px; height: 64px; border-radius: 10px; }
  .chip-meta { display: flex; flex-direction: column; gap: 2px; }
  .chip-name { font-size: 13px; font-weight: 600; color: var(--alias-color-label-normal); letter-spacing: 0.01em; }
  .chip-val  { font-size: 11px; font-weight: 500; color: var(--alias-color-label-alternative); font-feature-settings: "tnum"; letter-spacing: 0.02em; }
  
  .row { display: flex; align-items: baseline; gap: 24px; padding: 4px 0; }
  .label { font: 500 12px/16px var(--font-sans); letter-spacing: 0.02em; color: var(--alias-color-label-alternative); width: 110px; flex-shrink: 0; font-feature-settings: "tnum"; }
  .sample { color: var(--alias-color-label-normal); }

</style>
</head>
<body>
<div class="card">
<div class="row"><div class="label">Display 1<br>80 · 80 · -.03</div><div class="sample t-display1" style="font-size:64px;line-height:64px">Mile</div></div>
<div class="row"><div class="label">Display 2<br>56 · 72 · -.03</div><div class="sample t-display2" style="font-size:48px;line-height:54px">Mile Design</div></div>
<div class="row"><div class="label">Display 3<br>42 · 56 · -.03</div><div class="sample t-display3">Mile Design System</div></div>
</div></body></html>
