<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--alias-color-background-normal); }
  .card { width: 700px; box-sizing: border-box; padding: 24px 28px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 8px; }
  .chip {
    width: 88px; height: 88px; border-radius: 12px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.04);
  }
  .chip.sm { width: 64px; height: 64px; border-radius: 10px; }
  .chip-meta { display: flex; flex-direction: column; gap: 2px; }
  .chip-name { font-size: 13px; font-weight: 600; color: var(--alias-color-label-normal); letter-spacing: 0.01em; }
  .chip-val  { font-size: 11px; font-weight: 500; color: var(--alias-color-label-alternative); font-feature-settings: "tnum"; letter-spacing: 0.02em; }
  
  .row { display: flex; align-items: baseline; gap: 20px; padding: 2px 0; }
  .label { font: 500 11px/14px var(--font-sans); letter-spacing: 0.02em; color: var(--alias-color-label-alternative); width: 96px; flex-shrink: 0; font-feature-settings: "tnum"; }
  .sample { color: var(--alias-color-label-normal); }

</style>
</head>
<body>
<div class="card">
<div class="row"><div class="label">Title 1<br>36 · 48 · -.02</div><div class="sample t-title1">Title One — 36/48</div></div>
<div class="row"><div class="label">Title 2<br>28 · 38 · -.02</div><div class="sample t-title2">Title Two — 28/38</div></div>
<div class="row"><div class="label">Title 3<br>24 · 32 · -.02</div><div class="sample t-title3">Title Three — 24/32</div></div>
<div class="row"><div class="label">Heading 1<br>22 · 30 · -.01</div><div class="sample t-heading1">Heading One — 22/30</div></div>
<div class="row"><div class="label">Heading 2<br>20 · 28 · -.01</div><div class="sample t-heading2">Heading Two — 20/28</div></div>
</div></body></html>
